name: CI

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all checks (bypass change detection)'
        type: boolean
        default: true
  pull_request:
  push:
    branches:
      - main
jobs:
  # ===========================================
  # Determine which jobs to run based on changed files
  # ===========================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      website: ${{ steps.filter.outputs.website }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect file changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            rust:
              - 'apps/desktop/**'
            website:
              - 'apps/website/**'
              - 'pnpm-lock.yaml'
            scripts:
              - 'scripts/**'

  # ===========================================
  # Desktop app - Rust
  # ===========================================
  desktop-rust:
    name: Desktop (Rust)
    runs-on: ubuntu-latest
    needs: changes
    if: inputs.run_all || needs.changes.outputs.rust == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libxdo-dev

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Check rustfmt
        run: ./scripts/check/check --check rustfmt --ci

      - name: Run clippy
        run: ./scripts/check/check --check clippy --ci

      - name: Run Rust tests
        run: ./scripts/check/check --check cargo-test --ci

  # ===========================================
  # Desktop app - macOS compilation check
  # ===========================================
  desktop-rust-macos:
    name: Desktop (Rust, macOS)
    runs-on: macos-latest
    needs: changes
    if: inputs.run_all || needs.changes.outputs.rust == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build

  # ===========================================
  # Website
  # ===========================================
  website:
    name: Website
    runs-on: ubuntu-latest
    needs: changes
    if: inputs.run_all || needs.changes.outputs.website == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Cache pnpm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Run Prettier
        run: ./scripts/check/check --check prettier --ci

      - name: Run ESLint
        run: ./scripts/check/check --check website-eslint --ci

      - name: Run typecheck
        run: ./scripts/check/check --check website-typecheck --ci

      - name: Build website
        run: ./scripts/check/check --check website-build --ci

  # ===========================================
  # Scripts (Go checks)
  # ===========================================
  scripts:
    name: Scripts (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: inputs.run_all || needs.changes.outputs.scripts == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Build check tool
        run: go build -o check .
        working-directory: ./scripts/check

      - name: Check gofmt
        run: ./scripts/check/check --check gofmt --ci

      - name: Run go vet
        run: ./scripts/check/check --check go-vet --ci

      - name: Run staticcheck
        run: ./scripts/check/check --check staticcheck --ci

      - name: Run misspell
        run: ./scripts/check/check --check misspell --ci

      - name: Run gocyclo
        run: ./scripts/check/check --check gocyclo --ci

      - name: Run deadcode
        run: ./scripts/check/check --check deadcode --ci

      - name: Run Go tests
        run: ./scripts/check/check --check go-tests --ci

  # ===========================================
  # Website deployment
  # ===========================================
  deploy-website:
    name: Deploy website
    runs-on: ubuntu-latest
    needs: website
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy webhook
        run: |
          PAYLOAD='{}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)

          curl -f -X POST https://getprvw.com/hooks/deploy-website \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"

  # ===========================================
  # Summary job for branch protection
  # ===========================================
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [desktop-rust, desktop-rust-macos, website, scripts]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Some jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "Some jobs were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
